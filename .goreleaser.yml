version: 2
builds:
  - main: main.go
    binary: sesnap
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -X main.version={{.Version}}
    # クロスコンパイル時はCGO_ENABLEDはデフォルトでは有効にならない。なので有効にしたが
    # linux_syscall.c:67:13: error: implicit declaration of function 'setresgid' is invalid in C99
    # がでるので今回は無効化する
    env:
      - CGO_ENABLED=0
archives:
  - id: main
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README*
      - LICENSE*
snapshot:
  version_template: "{{ .Tag }}-next-{{.ShortCommit}}"
homebrew_casks:
  - name: sesnap
    repository:
      owner: xshoji
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/xshoji/sesnap
    description: A web page screenshot tool with parallel multi-URL capture and lock-free Chrome profile support, powered by chromedp (headless Chrome). Only Chrome is required — no Puppeteer, no Playwright, no Node.js, no Python.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
              args: ["-dr", "com.apple.quarantine", "#{staged_path}/althosts"]
          end
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
